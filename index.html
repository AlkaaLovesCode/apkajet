<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistik Burnout Siswa</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-yellow-100 via-amber-50 to-yellow-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl p-8 border border-yellow-200">

<!-- LOGIN -->
<div id="loginSection">
<h2 class="text-2xl font-bold text-center text-yellow-600 mb-6">Login</h2>

<input type="text" id="username" placeholder="Username"
class="w-full px-4 py-2 border border-yellow-300 rounded-lg mb-3 bg-amber-50">

<input type="password" id="password" placeholder="Password"
class="w-full px-4 py-2 border border-yellow-300 rounded-lg mb-4 bg-amber-50">

 </div>
<button onclick="login()"
class="w-full bg-yellow-400 hover:bg-yellow-500 text-white py-2 rounded-lg shadow-md">
Masuk
</button>



<!-- SISWA PANEL -->
<div id="studentPanel" class="hidden">

<h2 class="text-xl font-bold text-yellow-600 mb-4 text-center">
Kuesioner Burnout
</h2>

<div class="space-y-4 text-sm">

<div>
<p>1. Saya merasa lelah dengan tugas sekolah</p>
<div class="flex justify-between">
<input type="radio" name="q1" value="1">
<input type="radio" name="q1" value="2">
<input type="radio" name="q1" value="3">
<input type="radio" name="q1" value="4">
<input type="radio" name="q1" value="5">
</div>
</div>

<div>
<p>2. Saya kehilangan motivasi belajar</p>
<div class="flex justify-between">
<input type="radio" name="q2" value="1">
<input type="radio" name="q2" value="2">
<input type="radio" name="q2" value="3">
<input type="radio" name="q2" value="4">
<input type="radio" name="q2" value="5">
</div>
</div>

<div>
<p>3. Saya merasa stres karena tugas menumpuk</p>
<div class="flex justify-between">
<input type="radio" name="q3" value="1">
<input type="radio" name="q3" value="2">
<input type="radio" name="q3" value="3">
<input type="radio" name="q3" value="4">
<input type="radio" name="q3" value="5">
</div>
</div>

</div>

<button onclick="hitungBurnout()"
class="w-full mt-6 bg-amber-400 hover:bg-amber-500 text-white py-2 rounded-lg">
Kirim
</button>

<div id="result" class="mt-6 p-4 rounded-lg border text-sm hidden"></div>

<canvas id="studentChart" class="mt-6"></canvas>

<button onclick="logout()"
class="w-full mt-6 bg-gray-300 py-2 rounded-lg">
Logout
</button>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">

<h2 class="text-xl font-bold text-yellow-600 mb-4 text-center">
Admin Dashboard
</h2>

<div id="userList" class="text-sm mb-6"></div>

<canvas id="adminChart"></canvas>

<button onclick="logout()"
class="w-full mt-6 bg-gray-300 py-2 rounded-lg">
Logout
</button>

</div>

</div>

<script>
let currentUser = null;
let studentChartInstance = null;
let adminChartInstance = null;

const ADMIN_USER = "admin";
const ADMIN_PASS = "admin123";

/* ================= LOGIN ================= */

function login(){
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

if(!username || !password){
alert("Isi semua field!");
return;
}

if(username===ADMIN_USER && password===ADMIN_PASS){
document.getElementById("loginSection").classList.add("hidden");
document.getElementById("adminPanel").classList.remove("hidden");
loadAdminData();
return;
}

let users = JSON.parse(localStorage.getItem("users"))||{};
if(users[username]){
if(users[username]!==password){
alert("Password salah!");
return;
}
}else{
users[username]=password;
localStorage.setItem("users",JSON.stringify(users));
}

currentUser=username;

document.getElementById("loginSection").classList.add("hidden");
document.getElementById("studentPanel").classList.remove("hidden");

requestNotificationPermission();
setupDailyReminder();

updateStudentChart();
}

function logout(){
location.reload();
}

/* ================= HITUNG BURNOUT ================= */

function hitungBurnout(){
const q1=document.querySelector('input[name="q1"]:checked');
const q2=document.querySelector('input[name="q2"]:checked');
const q3=document.querySelector('input[name="q3"]:checked');

if(!q1||!q2||!q3){
alert("Jawab semua pertanyaan!");
return;
}

const total=parseInt(q1.value)+parseInt(q2.value)+parseInt(q3.value);

let kategori="";
if(total<=7) kategori="Rendah";
else if(total<=11) kategori="Sedang";
else kategori="Tinggi";

let data=JSON.parse(localStorage.getItem("burnoutData"))||{};
data[currentUser]={skor:total,kategori:kategori};
localStorage.setItem("burnoutData",JSON.stringify(data));

let kesimpulan="";

/* === TEKS KATEGORI === */

if(kategori==="Rendah"){
kesimpulan = `
🌱 <strong>Tingkat Burnout: Rendah</strong><br><br>
<strong>Kesimpulan:</strong><br>
Tingkat burnout kamu rendah — ini bagus! Kamu mungkin merasa sedikit letih atau stres, tapi masih bisa mengelolanya dengan jeda singkat atau self-care ringan. Ini tanda bahwa kamu masih punya kontrol terhadap keseimbangan hidupmu.
<br><br>
<strong>Saran untuk Mengatasi / Mencegah:</strong><br>
1. <strong>Tetapkan batas waktu kerja dan istirahat</strong> — jangan biarkan aktivitas memblender sehingga menguras energi.<br><br>
2. <strong>Rutin lakukan self-care sederhana</strong> — tidur cukup, olahraga ringan, atau ngobrol bareng teman.<br><br>
3. <strong>Jaga keseimbangan hidup</strong> — lakukan hal yang bermakna selain tugas rutin, seperti hobi atau quality time.
<br><br>
<strong>Kata Motivasi:</strong><br>
🌱 “Energi kecil hari ini berarti kamu punya ruang untuk tumbuh — manfaatkan dengan bijak, dan bahagiamu akan makin bertambah.”
`;
}

if(kategori==="Sedang"){
kesimpulan = `
🌤️ <strong>Tingkat Burnout: Sedang</strong><br><br>
<strong>Kesimpulan:</strong><br>
Tingkat burnout kamu termasuk sedang — artinya ada tanda-tanda kelelahan dan sedikit kehilangan semangat, tapi kamu masih punya energi tersisa untuk melakukan perbaikan diri. Ini fase bagus untuk mulai melakukan perubahan agar burnout tidak makin parah.
<br><br>
<strong>Saran untuk Mengatasi:</strong><br>
1. <strong>Ambil jeda singkat secara teratur</strong> — stop beberapa menit setiap jam untuk bernapas dalam atau jalan sebentar.<br><br>
2. <strong>Istirahat cukup di malam hari</strong> — tidur berkualitas membantu pemulihan energi.<br><br>
3. <strong>Lakukan aktivitas kecil yang bikin bahagia</strong> — hobi ringan seperti menggambar, mendengarkan musik, journaling.
<br><br>
<strong>Kata Motivasi:</strong><br>
🌼 “Langkah kecil hari ini adalah bukti bahwa kamu masih peduli pada kesehatanmu. Jangan berhenti — kamu sedang dalam proses pulih.”
`;
}

if(kategori==="Tinggi"){
kesimpulan = `
🔥 <strong>Tingkat Burnout: Tinggi</strong><br><br>
<strong>Kesimpulan:</strong><br>
Tingkat burnout kamu hari ini sangat tinggi — ini berarti kamu merasa sangat lelah secara fisik dan emosional, kehilangan energi, dan mungkin sulit fokus atau merasa tak berdaya. Burnout serius bukan hanya sekadar capek biasa; itu sinyal bahwa tubuh dan pikiranmu butuh istirahat dan perhatian yang lebih intensif 💡.
<br><br>
<strong>Saran untuk Mengatasi:</strong><br>
1. <strong>Istirahat total</strong> — beri jeda dari tugas utama dan lakukan kegiatan yang bikin kamu santai seperti berjalan santai, tidur cukup, dengarkan musik, atau membaca buku favorit.<br><br>
2. <strong>Atur batasan</strong> — tentukan waktu khusus untuk diri sendiri setiap hari dari pekerjaan atau hal yang bikin stres.<br><br>
3. <strong>Minta dukungan sosial</strong> — ngobrol sama teman atau keluarga tentang perasaanmu, atau kalau perlu pertimbangkan bantuan profesional seperti konselor/psikolog.
`;
}

const resultBox=document.getElementById("result");
resultBox.innerHTML=`<p><strong>Skor:</strong> ${total}</p><hr class="my-2">${kesimpulan}`;
resultBox.className="mt-6 p-4 rounded-lg border text-sm";

if(kategori==="Rendah") resultBox.classList.add("bg-green-100","border-green-300","text-green-800");
if(kategori==="Sedang") resultBox.classList.add("bg-yellow-100","border-yellow-300","text-yellow-800");
if(kategori==="Tinggi") resultBox.classList.add("bg-red-100","border-red-300","text-red-800");

resultBox.classList.remove("hidden");

updateStudentChart();
}

/* ================= CHART ================= */

function updateStudentChart(){
let data=JSON.parse(localStorage.getItem("burnoutData"))||{};
let rendah=0,sedang=0,tinggi=0;

for(let user in data){
if(data[user].kategori==="Rendah") rendah++;
if(data[user].kategori==="Sedang") sedang++;
if(data[user].kategori==="Tinggi") tinggi++;
}

const ctx=document.getElementById("studentChart");

if(studentChartInstance) studentChartInstance.destroy();

studentChartInstance=new Chart(ctx,{
type:"pie",
data:{
labels:["Rendah","Sedang","Tinggi"],
datasets:[{
data:[rendah,sedang,tinggi],
backgroundColor:["#86efac","#fde68a","#fca5a5"]
}]
}
});
}

/* ================= ADMIN ================= */

function loadAdminData(){
let data=JSON.parse(localStorage.getItem("burnoutData"))||{};
let html="<h3 class='font-semibold mb-2'>Daftar Siswa:</h3>";

let rendah=0,sedang=0,tinggi=0;

for(let user in data){
html+=`<p>${user} - Skor: ${data[user].skor} - ${data[user].kategori}</p>`;
if(data[user].kategori==="Rendah") rendah++;
if(data[user].kategori==="Sedang") sedang++;
if(data[user].kategori==="Tinggi") tinggi++;
}

document.getElementById("userList").innerHTML=html;

const ctx=document.getElementById("adminChart");

if(adminChartInstance) adminChartInstance.destroy();

adminChartInstance=new Chart(ctx,{
type:"pie",
data:{
labels:["Rendah","Sedang","Tinggi"],
datasets:[{
data:[rendah,sedang,tinggi],
backgroundColor:["#86efac","#fde68a","#fca5a5"]
}]
}
});
}

/* ================= NOTIFIKASI 7 HARI ================= */

function requestNotificationPermission(){
if("Notification" in window){
if(Notification.permission!=="granted"){
Notification.requestPermission();
}
}
}

function sendDailyNotification(){
if(Notification.permission==="granted"){
new Notification("Pengingat Burnout Check 💛",{
body:"Jangan lupa isi kuisioner burnout hari ini ya ✨"
});
}
}

function setupDailyReminder(){
let reminderData=JSON.parse(localStorage.getItem("reminderData"))||{
daysCompleted:0,
lastNotified:null
};

const today=new Date().toDateString();

if(reminderData.daysCompleted>=7) return;

if(reminderData.lastNotified!==today){
sendDailyNotification();
reminderData.lastNotified=today;
reminderData.daysCompleted+=1;
localStorage.setItem("reminderData",JSON.stringify(reminderData));
}
}
</script>

</body>
</html>
