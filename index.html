<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistik Burnout Siswa</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-yellow-100 via-amber-50 to-yellow-200 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8 border border-yellow-200">

    <!-- LOGIN -->
    <div id="loginSection">
      <h2 class="text-2xl font-bold text-center text-yellow-600 mb-6">
        Login / Register
      </h2>

      <input type="text" id="username" placeholder="Username"
        class="w-full px-4 py-2 border border-yellow-300 rounded-lg mb-3 bg-amber-50">

      <input type="password" id="password" placeholder="Password"
        class="w-full px-4 py-2 border border-yellow-300 rounded-lg mb-4 bg-amber-50">

      <button onclick="login()"
        class="w-full bg-yellow-400 hover:bg-yellow-500 text-white py-2 rounded-lg shadow-md">
        Masuk
      </button>

      <p class="text-xs text-gray-500 mt-3 text-center">
        Jika akun belum ada, akan otomatis dibuat.
      </p>
    </div>

    <!-- KUESIONER -->
    <div id="quizSection" class="hidden">
      <h2 class="text-2xl font-bold text-center text-yellow-600 mb-6">
        Kuesioner Burnout (Skala Likert)
      </h2>

      <div class="space-y-6 text-sm">

        <!-- Pertanyaan 1 -->
        <div>
          <p class="font-medium mb-2">
            1. Saya merasa lelah dengan tugas sekolah
          </p>
          <div class="flex justify-between text-xs text-gray-600 mb-1">
            <span>STS</span><span>TS</span><span>N</span><span>S</span><span>SS</span>
          </div>
          <div class="flex justify-between">
            <input type="radio" name="q1" value="1">
            <input type="radio" name="q1" value="2">
            <input type="radio" name="q1" value="3">
            <input type="radio" name="q1" value="4">
            <input type="radio" name="q1" value="5">
          </div>
        </div>

        <!-- Pertanyaan 2 -->
        <div>
          <p class="font-medium mb-2">
            2. Saya kehilangan motivasi belajar
          </p>
          <div class="flex justify-between text-xs text-gray-600 mb-1">
            <span>STS</span><span>TS</span><span>N</span><span>S</span><span>SS</span>
          </div>
          <div class="flex justify-between">
            <input type="radio" name="q2" value="1">
            <input type="radio" name="q2" value="2">
            <input type="radio" name="q2" value="3">
            <input type="radio" name="q2" value="4">
            <input type="radio" name="q2" value="5">
          </div>
        </div>

        <!-- Pertanyaan 3 -->
        <div>
          <p class="font-medium mb-2">
            3. Saya merasa stres karena tugas menumpuk
          </p>
          <div class="flex justify-between text-xs text-gray-600 mb-1">
            <span>STS</span><span>TS</span><span>N</span><span>S</span><span>SS</span>
          </div>
          <div class="flex justify-between">
            <input type="radio" name="q3" value="1">
            <input type="radio" name="q3" value="2">
            <input type="radio" name="q3" value="3">
            <input type="radio" name="q3" value="4">
            <input type="radio" name="q3" value="5">
          </div>
        </div>

      </div>

      <button onclick="hitungBurnout()"
        class="w-full mt-6 bg-amber-400 hover:bg-amber-500 text-white py-2 rounded-lg shadow-md">
        Kirim Jawaban
      </button>

      <div id="result"
        class="hidden mt-6 p-4 bg-yellow-100 rounded-lg border border-yellow-300 text-sm">
      </div>

      <div class="mt-6">
        <canvas id="burnoutChart"></canvas>
      </div>

      <button onclick="logout()"
        class="w-full mt-4 bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 rounded-lg">
        Logout
      </button>
    </div>

  </div>

<script>
let currentUser = null;
let chartInstance = null;

function login() {
  const usernameInput = document.getElementById("username").value;
  const passwordInput = document.getElementById("password").value;

  if (!usernameInput || !passwordInput) {
    alert("Username dan password wajib diisi!");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || {};

  if (users[usernameInput]) {
    if (users[usernameInput] !== passwordInput) {
      alert("Password salah!");
      return;
    }
  } else {
    users[usernameInput] = passwordInput;
    localStorage.setItem("users", JSON.stringify(users));
  }

  currentUser = usernameInput;

  document.getElementById("loginSection").classList.add("hidden");
  document.getElementById("quizSection").classList.remove("hidden");

  tampilkanStatistik();
  updateChart();
}

function logout() {
  currentUser = null;
  document.getElementById("quizSection").classList.add("hidden");
  document.getElementById("loginSection").classList.remove("hidden");
}

function hitungBurnout() {
  const q1 = document.querySelector('input[name="q1"]:checked');
  const q2 = document.querySelector('input[name="q2"]:checked');
  const q3 = document.querySelector('input[name="q3"]:checked');

  if (!q1 || !q2 || !q3) {
    alert("Semua pertanyaan harus dijawab!");
    return;
  }

  const total =
    parseInt(q1.value) +
    parseInt(q2.value) +
    parseInt(q3.value);

  let kategori = "";
  if (total <= 7) kategori = "Rendah";
  else if (total <= 11) kategori = "Sedang";
  else kategori = "Tinggi";

  let data = JSON.parse(localStorage.getItem("burnoutData")) || {};
  data[currentUser] = { skor: total, kategori: kategori };
  localStorage.setItem("burnoutData", JSON.stringify(data));

  tampilkanStatistik();
  updateChart();
}

function tampilkanStatistik() {
  let data = JSON.parse(localStorage.getItem("burnoutData")) || {};
  const resultDiv = document.getElementById("result");

  if (data[currentUser]) {
    resultDiv.innerHTML = `
      <p><strong>Username:</strong> ${currentUser}</p>
      <p><strong>Skor:</strong> ${data[currentUser].skor}</p>
      <p><strong>Kategori:</strong> ${data[currentUser].kategori}</p>
    `;
    resultDiv.classList.remove("hidden");
  }
}

function updateChart() {
  let data = JSON.parse(localStorage.getItem("burnoutData")) || {};

  let rendah = 0, sedang = 0, tinggi = 0;

  Object.values(data).forEach(item => {
    if (item.kategori === "Rendah") rendah++;
    else if (item.kategori === "Sedang") sedang++;
    else if (item.kategori === "Tinggi") tinggi++;
  });

  const ctx = document.getElementById("burnoutChart");

  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Rendah", "Sedang", "Tinggi"],
      datasets: [{
        data: [rendah, sedang, tinggi],
        backgroundColor: [
          "#fde68a",
          "#fbbf24",
          "#f59e0b"
        ]
      }]
    }
  });
}
</script>

</body>

</html>
